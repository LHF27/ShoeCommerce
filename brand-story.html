<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌故事</title>
    <link rel="stylesheet" href="/style.css/all.css">
    <link rel="stylesheet" href="/style.css/brand-story.css">
</head>
<body>
    <header class="brand-story__title">
        <h1 class="h1">品牌故事 <br> 
        <span class="h3">Brand Story</span>
        </h1>
        
    </header>
    <main class="brand-story__main container">
        <div class="row">

            <blockquote class="brand-story__quote col-8 m-auto">
                <h3 class="brand-story__quote__title h5">走出城市的節奏，穿上自己的步調。</h3>
                <p>我們相信，每一雙鞋都該帶著個性出場。</p>
                <p>在 URBNSTEP，我們認為鞋履不只是穿戴飾品，更是你與世界連結的語言。</p>
                <p>融合城市結構與機能語彙，我們打造適合都會節奏的風格鞋款，陪你自信穿梭每一場風景。</p>
            </blockquote>

            <div class="brand-story__image-wrapper col-10 m-auto">
                <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week1/about.png" alt="品牌故事圖片"> 
            </div>



        </div>
        
    </main>
</body>
</html>
